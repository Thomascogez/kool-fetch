name: Release

on:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write 
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v4

        - name: "Install bun"
          uses: oven-sh/setup-bun@v2
          with:
            bun-version: latest

        - name: "Install dependencies"
          run: bun install --frozen-lockfile

        - name: Checks
          run: bun run checks
        
        - name: Test
          run: bun run test:single

        - name: Build
          run: bun run build

        - uses: actions/setup-node@v4
          with:
            node-version: '24'
            registry-url: 'https://registry.npmjs.org'
        - run: npm publish # Currently use npm publish since bun does not support oidc publish for now